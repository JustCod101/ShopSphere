[alembic]
script_location = alembic
# sqlalchemy.url 在 env.py 中由环境变量 / Nacos 注入，此处仅占位
sqlalchemy.url = mysql+pymysql://placeholder/placeholder
# 文件名：版本号_时间戳_描述
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
timezone = UTC
# 启动时不输出 SQL（CI 友好）
sqlalchemy.echo = false

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
