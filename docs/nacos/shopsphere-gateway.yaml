# ============================================================================
# Nacos 配置 —— dataId: shopsphere-gateway.yaml | group: DEFAULT_GROUP | namespace: dev
# 这是要发布到 Nacos 配置中心的权威内容（仓库内仅作版本化备份，应用不从 classpath 加载）。
# 约束（CLAUDE.md / docs §3.1 §4.1 §5 §10）：路由 / CORS / 白名单只此一份，禁止写进 application.yml。
# ============================================================================
spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false                 # 显式路由，不开自动 locator
      httpclient:
        connect-timeout: 2000            # ms；防下游建连挂起拖垮网关（可调优）
        response-timeout: 10s            # 下游响应总超时
      routes:
        # —— /api/v1/** 版本重写：去掉 v1 段后再路由（§10），列在兼容路由前 ——
        - id: user-v1
          uri: lb://shopsphere-user
          predicates: [ "Path=/api/v1/user/**" ]
          filters: [ "RewritePath=/api/v1/(?<seg>.*), /api/${seg}" ]
        - id: product-v1
          uri: lb://shopsphere-product
          predicates: [ "Path=/api/v1/product/**" ]
          filters: [ "RewritePath=/api/v1/(?<seg>.*), /api/${seg}" ]
        - id: order-v1
          uri: lb://shopsphere-order
          predicates: [ "Path=/api/v1/order/**" ]
          filters: [ "RewritePath=/api/v1/(?<seg>.*), /api/${seg}" ]
        - id: recommend-v1
          uri: lb://shopsphere-recommendation
          predicates: [ "Path=/api/v1/recommend/**" ]
          filters: [ "RewritePath=/api/v1/(?<seg>.*), /api/${seg}" ]
        # —— 现有 /api/** 视为 v1 兼容入口（§10） ——
        - id: user
          uri: lb://shopsphere-user
          predicates: [ "Path=/api/user/**" ]
        - id: product
          uri: lb://shopsphere-product
          predicates: [ "Path=/api/product/**" ]
        - id: order
          uri: lb://shopsphere-order
          predicates: [ "Path=/api/order/**" ]
        - id: recommend
          uri: lb://shopsphere-recommendation
          predicates: [ "Path=/api/recommend/**" ]
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origin-patterns: [ "*" ]
            allowed-methods: [ "*" ]
            allowed-headers: [ "*" ]
            allow-credentials: true
            max-age: 3600                # 生产将 allowed-origin-patterns 收敛为具体域名

# docs §3.1 开工基线白名单（T1.1 仅绑定+热更新；JWT 匹配在 T1.2/T1.3 消费）
# /internal/** 不在白名单也无路由，由 InternalAccessRejectFilter 路由前 403/1004 拦截（§4.1 双保险）
security:
  whitelist:
    - /api/user/register
    - /api/user/login
    - /api/product/**
    - /api/recommend/similar/**
    - /api/recommend/health
