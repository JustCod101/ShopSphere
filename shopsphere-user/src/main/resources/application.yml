# 本地非业务项；jwt.private-key / DB 密码等机密由 Nacos shopsphere-user-${profile}.yaml 下发（Jasypt）。
# 路由/CORS 不在此处（由网关管理），白名单语义由 @PublicApi 注解就地声明。

logging:
  level:
    com.shopsphere.user: INFO
  pattern:
    # traceId 由 MDC 注入（UserContextInterceptor 写入 key=traceId）
    level: "%5p [${spring.application.name:}] [traceId=%X{traceId:-}]"

spring:
  jackson:
    # 跨服务/对外时间字段统一 ISO-8601 UTC（OffsetDateTime），禁止 epoch（CLAUDE.md / 契约 §1.1）
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSSXXX
    time-zone: UTC
  cloud:
    # T1.5 业务侧防御纵深限流（网关绕过/内网直连场景）
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:localhost:8858}
        port: 8720                  # 与 Gateway 8719 错开
      eager: true
      filter:
        enabled: true               # 注册 SentinelWebInterceptor 拦截所有 MVC 请求
      datasource:
        flow:
          nacos:
            server-addr: ${NACOS_HOST:localhost}:8848
            namespace: dev
            group-id: DEFAULT_GROUP
            data-id: shopsphere-user-flow-rules.json
            data-type: json
            rule-type: flow

# Seata 分布式事务客户端（TM/RM）。
# registry/config 用 Nacos 的 public 命名空间（namespace: ""）+ SEATA_GROUP，
# 与 seata/application.yml 的 Seata Server 一致 —— 注意区别于业务自身的 namespace=dev。
seata:
  enabled: true
  application-id: ${spring.application.name}
  tx-service-group: shopsphere-tx-group
  service:
    vgroup-mapping:
      shopsphere-tx-group: default
  registry:
    type: nacos
    nacos:
      application: seata-server
      server-addr: ${NACOS_HOST:localhost}:8848
      namespace: ""
      group: SEATA_GROUP
      cluster: default
  config:
    type: nacos
    nacos:
      server-addr: ${NACOS_HOST:localhost}:8848
      namespace: ""
      group: SEATA_GROUP
  data-source-proxy-mode: AT

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID         # MP 内置雪花
  # 全部走注解 Mapper（@Select），无 XML；mapper-locations 留空避免误导
  type-handlers-package: com.shopsphere.user.support

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus      # T5.3：Prometheus 指标抓取
  endpoint:
    health:
      show-details: never
