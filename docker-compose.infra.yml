# ShopSphere 基础设施一键编排（T0.2，仅 infra，不含业务服务）
# 启动：cp .env.example .env && docker compose -f docker-compose.infra.yml up -d
# 端口/库名严格对齐 docs/api-contracts.md §5；所有口令经 .env 注入，零硬编码
name: shopsphere-infra

networks:
  shopsphere-net:
    driver: bridge

services:

  mysql:
    image: mysql:8.0.36
    container_name: shopsphere-mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./scripts/01-init-mysql.sql:/docker-entrypoint-initdb.d/01-init-mysql.sql:ro
      - ./scripts/02-nacos-mysql-schema.sql:/docker-entrypoint-initdb.d/02-nacos-mysql-schema.sql:ro
      - ./scripts/03-seata-server.sql:/docker-entrypoint-initdb.d/03-seata-server.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks: [shopsphere-net]
    restart: unless-stopped

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: shopsphere-nacos
    platform: linux/amd64          # 镜像无 arm64，Apple Silicon 走 amd64 模拟
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: "3306"
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_SERVICE_DB_PARAM: characterEncoding=utf8&connectTimeout=5000&socketTimeout=30000&autoReconnect=true&useSSL=false&serverTimezone=UTC
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 512m
      JVM_XMX: 512m
      JVM_XMN: 256m
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    volumes:
      - ./data/nacos/logs:/home/nacos/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks: [shopsphere-net]
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: shopsphere-redis
    # dev 无密码；生产追加：--requirepass ${REDIS_PASSWORD}
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks: [shopsphere-net]
    restart: unless-stopped

  rabbitmq:
    build: ./rabbitmq
    image: shopsphere/rabbitmq:3.13-delayed
    container_name: shopsphere-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: shopsphere
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q check_running && rabbitmq-diagnostics -q check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks: [shopsphere-net]
    restart: unless-stopped

  # 一次性：Nacos 健康后推送 Seata 配置（逐 key dataId，group=SEATA_GROUP）
  # 复用 nacos 镜像（已含 bash+curl，无额外拉取，离线可复现）
  seata-config-init:
    image: nacos/nacos-server:v2.3.2
    container_name: shopsphere-seata-config-init
    platform: linux/amd64
    depends_on:
      nacos:
        condition: service_healthy
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        mkdir -p /tmp/sr
        # ${MYSQL_ROOT_PASSWORD} 占位用真实口令替换（[$] 匹配字面量 $），再推 Nacos
        sed "s|[$]{MYSQL_ROOT_PASSWORD}|$$MYSQL_ROOT_PASSWORD|g" /scripts/seata-config.txt > /tmp/config.txt
        # 官方脚本读 $(dirname $PWD)/config.txt，故 cd /tmp/sr → 读 /tmp/config.txt
        cd /tmp/sr
        bash /scripts/seata-nacos-config.sh -h nacos -p 8848 -g SEATA_GROUP
    restart: on-failure
    networks: [shopsphere-net]

  seata-server:
    image: seataio/seata-server:1.8.0
    container_name: shopsphere-seata
    platform: linux/amd64
    depends_on:
      seata-config-init:
        condition: service_completed_successfully
    volumes:
      - ./seata/application.yml:/seata-server/resources/application.yml:ro
    ports:
      - "8091:8091"
      - "7091:7091"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/8091'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    networks: [shopsphere-net]
    restart: unless-stopped

  sentinel-dashboard:
    image: bladex/sentinel-dashboard:1.8.8
    container_name: shopsphere-sentinel
    platform: linux/amd64
    ports:
      - "8858:8858"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8858/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [shopsphere-net]
    restart: unless-stopped
