# T2.1 商品服务本地非业务项；DB 密码等机密由 Nacos shopsphere-product-${profile}.yaml 下发（Jasypt）。
# 路由 / Sentinel 不在此处。

logging:
  level:
    com.shopsphere.product: INFO
  pattern:
    # traceId 由 MDC 注入（UserContextInterceptor 在 common 写入 key=traceId）
    level: "%5p [${spring.application.name:}] [traceId=%X{traceId:-}]"

spring:
  jackson:
    # 跨服务/对外时间字段统一 ISO-8601 UTC（OffsetDateTime），禁止 epoch（CLAUDE.md / 契约 §1.1）
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSSXXX
    time-zone: UTC

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID            # MP 内置雪花
      # T2.1：status 列做全局逻辑删除（1=有效，0=已删除）。无 status 列的表（如 t_product_stock）MP 自动跳过
      logic-delete-field: status
      logic-not-delete-value: 1
      logic-delete-value: 0
  # OffsetDateTime ↔ DATETIME(3) UTC 强制 TypeHandler 自动注册
  type-handlers-package: com.shopsphere.product.support

management:
  endpoints:
    web:
      exposure:
        include: health,metrics       # T2.2：metrics 用于缓存命中率监控
  endpoint:
    health:
      show-details: never
