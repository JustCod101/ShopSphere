# T2.1 商品服务本地非业务项；DB 密码等机密由 Nacos shopsphere-product-${profile}.yaml 下发（Jasypt）。
# 路由 / Sentinel 不在此处。

logging:
  level:
    com.shopsphere.product: INFO
  pattern:
    # traceId 由 MDC 注入（UserContextInterceptor 在 common 写入 key=traceId）
    level: "%5p [${spring.application.name:}] [traceId=%X{traceId:-}]"

spring:
  jackson:
    # 跨服务/对外时间字段统一 ISO-8601 UTC（OffsetDateTime），禁止 epoch（CLAUDE.md / 契约 §1.1）
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSSXXX
    time-zone: UTC

# Seata 分布式事务客户端（TM/RM）。
# registry/config 用 Nacos 的 public 命名空间（namespace: ""）+ SEATA_GROUP，
# 与 seata/application.yml 的 Seata Server 一致 —— 注意区别于业务自身的 namespace=dev。
seata:
  enabled: true
  application-id: ${spring.application.name}
  tx-service-group: shopsphere-tx-group
  service:
    vgroup-mapping:
      shopsphere-tx-group: default
  registry:
    type: nacos
    nacos:
      application: seata-server
      server-addr: ${NACOS_HOST:localhost}:8848
      namespace: ""
      group: SEATA_GROUP
      cluster: default
  config:
    type: nacos
    nacos:
      server-addr: ${NACOS_HOST:localhost}:8848
      namespace: ""
      group: SEATA_GROUP
  # Product 为 TCC-only 服务：关闭数据源 AT 自动代理。否则 Order 全局事务经 Feign 透传 XID 后，
  # Product 写 t_stock_tcc_log 会被注册为 AT 分支并要求 undo_log（Product 不建此表）。库存走 TCC（T3.3）。
  enable-auto-data-source-proxy: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID            # MP 内置雪花
      # T2.1：status 列做全局逻辑删除（1=有效，0=已删除）。无 status 列的表（如 t_product_stock）MP 自动跳过
      logic-delete-field: status
      logic-not-delete-value: 1
      logic-delete-value: 0
  # OffsetDateTime ↔ DATETIME(3) UTC 强制 TypeHandler 自动注册
  type-handlers-package: com.shopsphere.product.support

management:
  endpoints:
    web:
      exposure:
        include: health,metrics       # T2.2：metrics 用于缓存命中率监控
  endpoint:
    health:
      show-details: never
