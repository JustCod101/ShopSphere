server:
  port: 8082

spring:
  application:
    name: shopsphere-product
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:localhost}:8848
        namespace: dev
        group: DEFAULT_GROUP
      config:
        server-addr: ${NACOS_HOST:localhost}:8848
        namespace: dev
        group: DEFAULT_GROUP
        file-extension: yaml
        refresh-enabled: true
        # 共享非密：shopsphere-product.yaml
        # 环境密：    shopsphere-product-${profile}.yaml（DB 密码，Jasypt 加密）

# Jasypt 主密钥仅由环境变量 JASYPT_ENCRYPTOR_PASSWORD 注入，不落配置文件
jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD:}
