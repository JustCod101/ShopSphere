server:
  port: 8083

spring:
  application:
    name: shopsphere-order
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:localhost}:8848
        namespace: dev
        group: DEFAULT_GROUP
      config:
        server-addr: ${NACOS_HOST:localhost}:8848
        namespace: dev
        group: DEFAULT_GROUP
        file-extension: yaml
        refresh-enabled: true
        # 共享非密配置：shopsphere-order.yaml
        # 环境密配置：    shopsphere-order-${profile}.yaml（DB 密码，Jasypt 加密）

jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD:}
